<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Slytherin DEX — API-first decentralized exchange developer playground for Algorand" />
    <title>Slytherin DEX Developer Playground</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <div class="header__logo">
          <div class="header__icon">🐍</div>
          <h1 class="header__title">Slytherin DEX</h1>
        </div>
        <p class="header__subtitle">
          Developer Playground &mdash; API-first decentralized exchange on Algorand
        </p>
        <div class="header__badge">
          <span class="status-badge">
            <span class="status-badge__dot"></span>
            Testnet
          </span>
        </div>
      </header>

      <!-- Configuration -->
      <section class="card" id="config-card">
        <div class="card__title">
          <span class="card__title-dot card__title-dot--blue"></span>
          Configuration
        </div>
        <div class="form-row">
          <label for="sender">Sender Address</label>
          <input id="sender" placeholder="Enter your Algorand address" />
        </div>
        <div class="form-row">
          <label for="direction">Direction</label>
          <select id="direction">
            <option value="algo_to_asset">ALGO → Asset</option>
            <option value="asset_to_algo">Asset → ALGO</option>
          </select>
        </div>
        <div class="form-row">
          <label for="amountIn">Amount (micro)</label>
          <input id="amountIn" value="1000000" />
        </div>
        <div class="form-row">
          <label for="slippageBps">Slippage (bps)</label>
          <input id="slippageBps" value="100" />
        </div>
        <div class="form-row">
          <label for="token">Auth Token</label>
          <input id="token" placeholder="JWT from /health/auth/verify" />
        </div>
      </section>

      <!-- Actions -->
      <section class="card">
        <div class="card__title">
          <span class="card__title-dot card__title-dot--green"></span>
          Actions
        </div>
        <div class="actions">
          <button id="btnReserves" class="btn-primary">📊 Get Reserves</button>
          <button id="btnQuote" class="btn-primary">💱 Get Quote</button>
          <button id="btnExecute" class="btn-green">⚡ Execute Swap</button>
          <button id="btnSubmit" class="btn-secondary">📤 Submit Signed</button>
        </div>
      </section>

      <!-- Transactions -->
      <section class="card">
        <div class="card__title">
          <span class="card__title-dot card__title-dot--purple"></span>
          Transactions
        </div>
        <div class="txn-group">
          <div class="txn-group__item">
            <label for="unsignedTxns">Unsigned Txns</label>
            <textarea id="unsignedTxns" placeholder='["base64tx1","base64tx2"]'></textarea>
          </div>
          <div class="txn-group__item">
            <label for="signedTxns">Signed Txns</label>
            <textarea id="signedTxns" placeholder='["base64signed1","base64signed2"]'></textarea>
          </div>
        </div>
      </section>

      <!-- Output -->
      <section class="card output-section">
        <div class="card__title">
          <span class="card__title-dot card__title-dot--amber"></span>
          Response Output
        </div>
        <pre id="output">{}</pre>
      </section>

      <!-- Footer -->
      <footer class="footer">
        <p>Slytherin DEX &mdash; Frontendless, API-first &middot; <a href="/api/v1">API Docs</a></p>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
